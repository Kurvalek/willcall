<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F8F8F4">
  <title>FANATIK — Track your shows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #F8F8F4;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --gradient-start: #4DCBF1;
      --gradient-end: #9C5AFE;
      --bar-unfilled: #D8D8D8;
      --safe-top: env(safe-area-inset-top, 0px);
    }
    html {
      background: #1a1a1a;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding-top: var(--safe-top);
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* iOS status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .status-bar .time { flex: 1; text-align: left; }
    .status-bar .dynamic-island {
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .status-bar .icons {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      font-size: 14px;
    }

    /* Main content */
    .content {
      padding: 32px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: calc(100vh - 60px);
      min-height: calc(100dvh - 60px);
    }

    .logo {
      margin-bottom: 24px;
      max-width: 220px;
      height: auto;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .tagline {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .progress-bar {
      width: 100%;
      max-width: 280px;
      height: 6px;
      background: var(--bar-unfilled);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 80px;
    }
    .progress-bar-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
      border-radius: 3px;
      animation: fillEmpty 2.5s ease-in-out infinite;
    }
    @keyframes fillEmpty {
      0%, 100% { width: 0%; }
      50% { width: 100%; }
    }

    .cta {
      display: block;
      width: 100%;
      max-width: 280px;
      padding: 16px 32px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
      box-shadow: 0 4px 14px rgba(157, 90, 254, 0.35);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(157, 90, 254, 0.4);
    }
    .cta:active {
      transform: translateY(0);
    }

    .sign-in {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: auto;
    }
    .sign-in a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .sign-in a:hover { opacity: 0.8; }

    .terms {
      margin-top: 32px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .terms a {
      color: var(--text-muted);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .terms a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="dynamic-island" aria-hidden="true"></div>
    <div class="icons" aria-hidden="true">
      <span>📶</span>
      <span>📡</span>
      <span>🔋</span>
    </div>
  </div>

  <main class="content">
    <div class="logo">
      <img src="/assets/AppLogo.svg" alt="FANATIK">
    </div>
    <p class="tagline">Track your shows. Share your story.</p>
    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>
    <a href="/spotify-concerts" class="cta">Let's Go</a>
    <p class="sign-in">Already have an account? <a href="/signin">Sign in.</a></p>
    <p class="terms">By tapping "Let's Go" you are accepting <a href="/terms">the terms.</a></p>
  </main>
</body>
</html>
